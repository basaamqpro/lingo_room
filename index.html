async function translateText(text_data, para, r) {
  const text = text_data.trim();
  if (!text) return;

  const targetLang = languageMap[chatroom_language];

  if (!targetLang) {
    // alert("Unsupported language");
    return;
  }

  const params = new URLSearchParams({
    client: "gtx",
    sl: "en",                 // always English
    tl: targetLang,           // dynamic target
    dj: "1",
    ie: "UTF-8",
    oe: "UTF-8",
    q: text
  });

  params.append("dt", "t");
  params.append("dt", "rm"); // transliteration if available

  const url =
    "https://translate.googleapis.com/translate_a/single?" +
    params.toString();

  const res = await fetch(url);
  const data = await res.json();

  const sentences = data.sentences || [];
const translated = sentences.map(s => s.trans).join("");
  const translit = needsRomanization(chatroom_language)
  ? sentences.map(s => s.translit || "").join(" ").trim()
  : translated; // 👈 KEY LINE

  // UI output (rename ids later if you want)
  document.getElementById("jp").textContent = translated;
  document.getElementById("romaji").textContent = translit;

  const data_input = [
    text,        // English
    translated,  // Target language
    translit     // Transliteration (if any)
  ];

  if (para === "edit") {
    app_chat_data[chatroom_language][chatroom_number][r] = data_input;
  } else {
    app_chat_data[chatroom_language][chatroom_number].push(data_input);
  }

  show_room(app_chat_data[chatroom_language][chatroom_number]);
  save_storage()
}

function createRoom() {
  if (!chatroom_language) {
    // alert("Select a language first");
    return;
  }

  const rooms = Object.keys(app_chat_data[chatroom_language]);

  let n = 1;
  while (rooms.includes("room" + n)) {
    n++;
  }

  const roomName = "room" + n;

  app_chat_data[chatroom_language][roomName] = [];
  chatroom_number = roomName;

  navbar_rooms();
  show_room(app_chat_data[chatroom_language][roomName]);
  save_storage()
  console.log("Room created:", roomName);
  console.log(app_chat_data);
}





function renameRoom(language, oldName, newName) {
  if (!newName || newName === oldName) return;
  if (app_chat_data[language][newName]) {
    // alert("Room name already exists");
    return;
  }

  app_chat_data[language][newName] =
    app_chat_data[language][oldName];

  delete app_chat_data[language][oldName];

  // update selected room if needed
  if (chatroom_number === oldName) {
    chatroom_number = newName;
    // alert(88)
  }
}

function deleteRoom(language, roomName) {
  const rooms = Object.keys(app_chat_data[language]);

  // Safety: don't allow deleting the last room
  if (rooms.length === 1) {
    // alert("You must have at least one room");
    return;
  }

  delete app_chat_data[language][roomName];

  // If deleted room was active, switch to another one
  if (chatroom_number === roomName) {
    const remainingRooms = Object.keys(app_chat_data[language]);
    chatroom_number = remainingRooms[0];
    show_room(app_chat_data[language][chatroom_number]);
  }
}

 async function render_colour_highlight_pure(enText, jpText, rmText, container) {
    const COLORS = ["red","green","blue","orange","purple","brown","teal","pink","grey","black"];
    let colorIndex = 0;

    const enWords = enText.trim().split(/\s+/);
    const rmWords = rmText.trim().split(/\s+/);
    const jpWords = jpText.trim().split(/\s+/); // display only

    const enP = document.createElement("p");
    const jpP = document.createElement("p");
    const rmP = document.createElement("p");

    console.log("EN:", enWords);
console.log("RM:", rmWords);
console.log("JP:", jpText);

    // RM spans (SOURCE OF TRUTH)
    const rmSpans = rmWords.map(word => {
        const span = document.createElement("span");
        span.innerText = word + " ";
        rmP.appendChild(span);
        return span;
    });

    // JP spans (DISPLAY ONLY)
    const jpSpans = jpWords.map(word => {
        const span = document.createElement("span");
        span.innerText = word + " ";
        jpP.appendChild(span);
        return span;
    });

    const rmUsed = new Array(rmWords.length).fill(false);

    for (let i = 0; i < enWords.length; i++) {
        const spanEn = document.createElement("span");
        spanEn.innerText = enWords[i] + " ";

        let apiToken = "";
        try {
            const { translated, rm } = await translateWord(enWords[i]);
            apiToken = (rm || translated).toLowerCase();
        } catch {}

        let matchedIndex = -1;
        for (let j = 0; j < rmWords.length; j++) {
            if (rmUsed[j]) continue;
            const rmLower = rmWords[j].toLowerCase();
            if (apiToken && (rmLower.includes(apiToken) || apiToken.includes(rmLower))) {
                matchedIndex = j;
                break;
            }
        }

        if (matchedIndex !== -1) {
            const color = COLORS[colorIndex++ % COLORS.length];

            spanEn.style.color = color;
            spanEn.style.fontWeight = "bold";

            rmSpans[matchedIndex].style.color = color;
            rmSpans[matchedIndex].style.fontWeight = "bold";

            // 🔒 SAFE JP coloring
            if (jpSpans[matchedIndex]) {
                jpSpans[matchedIndex].style.color = color;
                jpSpans[matchedIndex].style.fontWeight = "bold";
            }

            rmUsed[matchedIndex] = true;
        }

        enP.appendChild(spanEn);
    }

    container.innerHTML = "";
    container.appendChild(enP); // English
    container.appendChild(jpP); // Translation
    container.appendChild(rmP); // Transliteration
}


// Minimal API wrapper
async function translateWord(word) {
  const targetLang = languageMap[chatroom_language] || "ja";

  const url =
    `https://translate.googleapis.com/translate_a/single` +
    `?client=gtx&sl=en&tl=${targetLang}&dt=t&dt=rm&q=${encodeURIComponent(word)}`;

  const res = await fetch(url);
  const data = await res.json();

  const translated = data[0][0]?.[0] || "";
  const rm = data[0][1]?.[2] || "";

  return { translated, rm };
}
